<body class="bg-surface min-h-screen flex flex-col items-center justify-between py-12 px-margin-mobile">

<div class="w-24 h-24 mb-6 rounded-2xl overflow-hidden shadow-sm border border-outline-variant bg-white flex items-center justify-center">
<img alt="ClassBridge AI Logo" class="w-20 h-20 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCEifBkSjXm6w39s-bbLsyBJe23BeqY-ZllOK36VXu6w8FUnvdvQOS-m7MOcRcXovtnt5aKma6rKHxHEa6cZwR20h3X8o62Au6gA1VDbIK1QmjjR0UDEgRwmCwjmULCGIbAL8qxe8vDGW1KNNbVnUd-pLUPJzqAIpKMT782H2eRRyF-oUqyMn3cIaDHdaPEHoBHmxiaeli7zfn4Ylwm7flWXDtjxcv-EjbkKCMGvY0oTJnf-dnQYt4Y4G-P1qks7IHrix9A_D1LF3am"/>

<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-2">

        </p>

<!-- Role Selection Grid -->
<main class="w-full max-w-2xl grid grid-cols-1 md:grid-cols-2 gap-stack-lg my-12">
<!-- Teacher Card -->
<button class="role-card ripple group relative flex flex-col items-center justify-center p-stack-lg bg-white border border-outline-variant rounded-[24px] transition-all duration-300 hover:border-primary-container hover:shadow-xl hover:-translate-y-1 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary ring-offset-4" onclick="selectRole('teacher')">
<!-- Contextual Accent Bar -->
<div class="absolute left-0 top-1/4 bottom-1/4 w-1 bg-primary rounded-r-full"></div>
<div class="icon-bg w-20 h-20 mb-4 bg-primary-fixed rounded-2xl flex items-center justify-center transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<span class="font-headline-md text-headline-md text-primary mb-1">Teacher Mode</span>
<span class="font-label-md text-label-md text-on-surface-variant">Manage lessons &amp; students</span>
<div class="mt-6 px-6 py-3 bg-primary text-on-primary rounded-full font-label-md text-label-md opacity-0 group-hover:opacity-100 transition-opacity">
                Enter Classroom
            </div>
</button>
<!-- Student Card -->
<button class="role-card ripple group relative flex flex-col items-center justify-center p-stack-lg bg-white border border-outline-variant rounded-[24px] transition-all duration-300 hover:border-secondary-container hover:shadow-xl hover:-translate-y-1 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-secondary ring-offset-4" onclick="selectRole('student')">
<!-- Contextual Accent Bar -->
<div class="absolute left-0 top-1/4 bottom-1/4 w-1 bg-secondary rounded-r-full"></div>
<div class="icon-bg w-20 h-20 mb-4 bg-secondary-fixed rounded-2xl flex items-center justify-center transition-transform duration-300">
<span class="material-symbols-outlined text-secondary text-[40px]" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<span class="font-headline-md text-headline-md text-primary mb-1">Student Mode</span>
<span class="font-label-md text-label-md text-on-surface-variant">Access resources &amp; tasks</span>
<div class="mt-6 px-6 py-3 bg-secondary text-on-secondary rounded-full font-label-md text-label-md opacity-0 group-hover:opacity-100 transition-opacity">
                Join Lesson
            </div>
</button>
</main>
<!-- Footer Section -->
<footer class="w-full max-w-md flex flex-col items-center space-y-stack-sm text-center">
<div class="flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-sm text-primary" data-icon="wifi_off">wifi_off</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Offline-first classroom</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-4">
            New deployment? 
            <a class="text-secondary font-semibold hover:underline underline-offset-4 decoration-2 transition-all" href="#">
                Setup Local Hub
            </a>
</p>
<!-- System Status Bar (Subtle) -->

<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Hub Sync: Active</span>
<span class="flex items-center gap-1">Ver: 2.4.0-Stable</span>
</div>
</footer>
<!-- Role Selection Micro-interaction Script -->
<script>
        function selectRole(role) {
            console.log("Selected role:", role);
            // Visual feedback
            const body = document.body;
            const overlay = document.createElement('div');
            overlay.className = `fixed inset-0 z-[100] transition-opacity duration-500 ease-in-out pointer-events-none ${role === 'teacher' ? 'bg-primary' : 'bg-secondary'} opacity-0`;
            document.body.appendChild(overlay);
            
            setTimeout(() => {
                overlay.classList.replace('opacity-0', 'opacity-20');
            }, 10);

            // In a real app, this would navigate to the respective dashboard
            // For now, we simulate a slight delay
            setTimeout(() => {
                overlay.classList.replace('opacity-20', 'opacity-0');
            }, 600);
        }

        // Ripple Effect Handler
        document.querySelectorAll('.ripple').forEach(button => {
            button.addEventListener('click', function(e) {
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                let ripples = document.createElement('span');
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                ripples.classList.add('absolute', 'w-0', 'h-0', 'bg-white', 'opacity-25', 'rounded-full', 'transform', '-translate-x-1/2', '-translate-y-1/2', 'animate-ping');
                this.appendChild(ripples);
                setTimeout(() => ripples.remove(), 1000);
            });
        });
    </script>
